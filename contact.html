<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Harsh Ujala</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="brand">Harsh Ujala</a>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="skills.html">Skills</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html" class="active">Contact</a>
                <button type="button">Sign In</button>
                <button type="button" class="hidden">Log Out</button>
            </nav>
        </div>
    </header>

    <div class="page-banner">
        <div class="container">
            <span class="eyebrow">Reach Out</span>
            <h1>Get In Touch</h1>
        </div>
    </div>

    <main class="main-content">
        <div class="container">

            <div class="contact-grid section">

                <!-- Left: info -->
                <aside class="contact-left">
                    <span class="eyebrow">Direct Contact</span>
                    <h2>Let's Connect</h2>
                    <span class="rule"></span>

                    <div class="contact-card">
                        <div class="contact-row">
                            <span class="contact-lbl">Email</span>
                            <span class="contact-val">
                                <a href="mailto:harsh.ujala.2024@makers.rishihood.edu.in">
                                    harsh.ujala.2024@makers.rishihood.edu.in
                                </a>
                            </span>
                        </div>
                        <div class="contact-row">
                            <span class="contact-lbl">Phone</span>
                            <span class="contact-val">
                                <a href="tel:+918448443551">+91 8448 443 551</a>
                            </span>
                        </div>
                        <div class="contact-row">
                            <span class="contact-lbl">Location</span>
                            <span class="contact-val">Narela, Delhi</span>
                        </div>
                    </div>

                    <a href="https://linkedin.com/in/harsh-ujala-b54bb031b"
                       target="_blank"
                       class="linkedin-btn">
                        <span class="li-dot"></span>
                        LinkedIn Profile
                    </a>
                </aside>

                <!-- Right: form -->
                <div class="contact-right">
                    <span class="eyebrow">Send a Message</span>
                    <h2>Drop Me a Line</h2>
                    <span class="rule"></span>

                    <div class="form-wrap">
                        <form action="#" method="post">
                            <fieldset>
                                <legend>Contact Form</legend>

                                <div class="form-row">
                                    <label for="full-name" class="form-lbl">Full Name</label>
                                    <input type="text" id="full-name" name="full-name"
                                           class="form-in" placeholder="Your full name" required>
                                </div>

                                <div class="form-row">
                                    <label for="email" class="form-lbl">Email Address</label>
                                    <input type="email" id="email" name="email"
                                           class="form-in" placeholder="your@email.com" required>
                                </div>

                                <div class="form-row">
                                    <label for="subject" class="form-lbl">Subject</label>
                                    <input type="text" id="subject" name="subject"
                                           class="form-in" placeholder="What is this about?">
                                </div>

                                <div class="form-row">
                                    <label for="message" class="form-lbl">Message</label>
                                    <textarea id="message" name="message"
                                              class="form-ta"
                                              placeholder="Write your message here..."></textarea>
                                </div>

                                <div class="form-row">
                                    <button type="submit" class="btn btn-accent btn-submit">
                                        Send Message
                                    </button>
                                </div>

                            </fieldset>
                        </form>
                    </div>
                </div>

            </div>

        </div>
    </main>

    <a href="#" class="back-to-top">↑</a>

    <footer class="site-footer">
        <span>© 2026 Harsh Ujala</span>
        <a href="https://linkedin.com/in/harsh-ujala-b54bb031b" target="_blank">LinkedIn</a>
    </footer>

</body>
</html>
